# Configura a URL base do servidor Ollama
quarkus.langchain4j.ollama.base-url=http://localhost:11434/

# Define o ID do modelo de chat Ollama a ser usado
quarkus.langchain4j.ollama.chat-model.model-id=gpt-oss:20b

# Define um tempo limite de 60 segundos para as solicitaçőes ao modelo Ollama
quarkus.langchain4j.ollama.timeout=60s

# Configura o caminho para os arquivos de RAG (Retrieval-Augmented Generation)
quarkus.langchain4j.easy-rag.path=src/main/resources/rag

# Define o tamanho máximo do segmento para criar chunks de RAG. Isso ajuda a controlar a quantidade de informaçőes em cada segmento.
quarkus.langchain4j.easy-rag.max-segment-size=100

# Define o tamanho máximo de sobreposiçăo para RAG
# Atribuido 20% do tamanho do max-segment-size para manter a coeręncia entre os segmentos.
quarkus.langchain4j.easy-rag.max-overlap-size=20